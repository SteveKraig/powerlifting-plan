    function sumDay(meals) {
      return meals.reduce((acc, m) => {
        m.items.forEach(i => { acc.kcal += i.kcal; acc.p += i.p; acc.k += i.k; acc.f += i.f; });
        return acc;
      }, { kcal: 0, p: 0, k: 0, f: 0 });
    }

    function Badge({ label, value, color }) {
      return (
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 14, fontWeight: 700, color }}>{value}</div>
          <div style={{ fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1 }}>{label}</div>
        </div>
      );
    }

    function MealCard({ meal }) {
      const [open, setOpen] = useState(false);
      const tot = meal.items.reduce((a, i) => ({ kcal: a.kcal + i.kcal, p: a.p + i.p, k: a.k + i.k, f: a.f + i.f }), { kcal: 0, p: 0, k: 0, f: 0 });
      return (
        <div style={{ background: C.card, border: `1px solid ${open ? C.accent : C.border}`, borderRadius: 10, marginBottom: 8, overflow: "hidden" }}>
          <div onClick={() => setOpen(o => !o)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px", cursor: "pointer" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, flex: 1, minWidth: 0 }}>
              <span style={{ fontSize: 11, color: C.muted, minWidth: 62, flexShrink: 0 }}>{meal.time}</span>
              <span style={{ fontSize: 14, fontWeight: 600, color: C.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{meal.emoji} {meal.name}</span>
            </div>
            <div style={{ display: "flex", gap: 10, alignItems: "center", flexShrink: 0 }}>
              <span style={{ fontSize: 13, color: C.accent, fontWeight: 700 }}>{tot.kcal} kcal</span>
              <span style={{ color: C.muted, fontSize: 16, display: "inline-block", transform: open ? "rotate(90deg)" : "none" }}>›</span>
            </div>
          </div>
          {open && (
            <div style={{ padding: "0 14px 14px", borderTop: `1px solid ${C.border}` }}>
              {meal.note && <div style={{ background: C.accentLow, border: "1px solid #5a1010", borderRadius: 6, padding: "7px 10px", margin: "10px 0", fontSize: 12, color: "#ff9090" }}>💡 {meal.note}</div>}
              <div style={{ display: "flex", gap: 20, padding: "10px 0", marginBottom: 6, borderBottom: `1px solid ${C.border}` }}>
                <Badge label="Kcal" value={tot.kcal} color={C.accent} />
                <Badge label="Protein" value={`${tot.p}g`} color={C.blue} />
                <Badge label="KH" value={`${tot.k}g`} color={C.yellow} />
                <Badge label="Fett" value={`${tot.f}g`} color="#a5d6a7" />
              </div>
              <table style={{ width: "100%", fontSize: 12, borderCollapse: "collapse" }}>
                <thead>
                  <tr>{["Lebensmittel","g","kcal","P","KH","F"].map((h,i) => <th key={i} style={{ textAlign: i===0?"left":"right", color: C.muted, paddingBottom: 6, fontWeight: 500, fontSize: 11 }}>{h}</th>)}</tr>
                </thead>
                <tbody>
                  {meal.items.map((item, i) => (
                    <tr key={i} style={{ borderTop: `1px solid ${C.border}` }}>
                      <td style={{ padding: "5px 0", color: C.text }}>{item.name}</td>
                      <td style={{ textAlign: "right", color: C.muted }}>{item.g > 0 ? item.g : "–"}</td>
                      <td style={{ textAlign: "right", color: C.accent, fontWeight: 600 }}>{item.kcal}</td>
                      <td style={{ textAlign: "right", color: C.blue }}>{item.p}g</td>
                      <td style={{ textAlign: "right", color: C.yellow }}>{item.k}g</td>
                      <td style={{ textAlign: "right", color: "#a5d6a7" }}>{item.f}g</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      );
    }

    function PlanTab() {
      const [activeDay, setActiveDay] = useState("do");
      const day = days.find(d => d.id === activeDay);
      const tot = sumDay(day.meals);
      return (
        <div>
          <div style={{ display: "flex", gap: 6, marginBottom: 14, overflowX: "auto", paddingBottom: 2 }}>
            {days.map(d => (
              <button key={d.id} onClick={() => setActiveDay(d.id)} style={{ background: activeDay===d.id ? C.accent : C.card, border: `1px solid ${activeDay===d.id ? C.accent : C.border}`, color: C.text, borderRadius: 8, padding: "8px 16px", cursor: "pointer", fontWeight: 700, fontSize: 13, flexShrink: 0 }}>{d.label}</button>
            ))}
          </div>
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "14px 16px", marginBottom: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
              <div>
                <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: 2 }}>{day.sublabel}</div>
                <span style={{ display: "inline-block", marginTop: 4, background: day.tagColor+"22", color: day.tagColor, border: `1px solid ${day.tagColor}44`, borderRadius: 6, padding: "3px 10px", fontSize: 12, fontWeight: 600 }}>{day.tag}</span>
              </div>
              <div style={{ display: "flex", gap: 14 }}>
                <Badge label="Kcal" value={tot.kcal} color={C.accent} />
                <Badge label="Protein" value={`${tot.p}g`} color={C.blue} />
                <Badge label="KH" value={`${tot.k}g`} color={C.yellow} />
                <Badge label="Fett" value={`${tot.f}g`} color="#a5d6a7" />
              </div>
            </div>
            {day.note && <div style={{ fontSize: 12, color: C.muted, borderTop: `1px solid ${C.border}`, paddingTop: 8 }}>📋 {day.note}</div>}
          </div>
          {day.meals.map((m, i) => <MealCard key={i} meal={m} />)}
        </div>
      );
    }

    function GroceryTab() {
      const [checked, setChecked] = useState({});
      const toggle = k => setChecked(c => ({ ...c, [k]: !c[k] }));
      const allItems = groceries.edeka.reduce((a,c) => a+c.items.length, 0) + groceries.dm.reduce((a,c) => a+c.items.length, 0);
      const total = Object.values(checked).filter(Boolean).length;
      const CheckRow = ({ item, id }) => (
        <div onClick={() => toggle(id)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 0", cursor: "pointer", opacity: checked[id] ? 0.35 : 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ width: 20, height: 20, borderRadius: 5, flexShrink: 0, border: `2px solid ${checked[id] ? C.green : C.border}`, background: checked[id] ? C.green : "transparent", display: "flex", alignItems: "center", justifyContent: "center" }}>
              {checked[id] && <span style={{ color: "#000", fontSize: 12, fontWeight: 900 }}>✓</span>}
            </div>
            <div>
              <div style={{ fontSize: 13, color: C.text, textDecoration: checked[id] ? "line-through" : "none" }}>{item.name}</div>
              {item.note && <div style={{ fontSize: 11, color: C.yellow, marginTop: 1 }}>⚠ {item.note}</div>}
            </div>
          </div>
          <span style={{ fontSize: 12, color: C.muted, flexShrink: 0, marginLeft: 8 }}>{item.amount}</span>
        </div>
      );
      return (
        <div>
          <div style={{ background: C.greenLow, border: "1px solid #1a4a30", borderRadius: 10, padding: "12px 14px", marginBottom: 14 }}>
            <div style={{ fontSize: 12, color: C.green, fontWeight: 700, marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 }}>✅ Zuhause vorhanden – nicht kaufen</div>
            {groceries.zuhause.map((item, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", fontSize: 13, color: C.text }}>
                <span>{item.name}</span><span style={{ color: C.green, fontSize: 12 }}>{item.note}</span>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: 2, fontWeight: 700 }}>🛒 Edeka</div>
            <div style={{ fontSize: 11, color: C.muted }}>{total}/{allItems} abgehakt</div>
          </div>
          {groceries.edeka.map((cat, ci) => (
            <div key={ci} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "12px 14px", marginBottom: 10 }}>
              <div style={{ fontSize: 11, color: C.muted, fontWeight: 700, marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 }}>{cat.cat}</div>
              {cat.items.map((item, ii) => <div key={ii} style={{ borderTop: ii>0 ? `1px solid ${C.border}` : "none" }}><CheckRow item={item} id={`e-${ci}-${ii}`} /></div>)}
            </div>
          ))}
          <div style={{ fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: 2, fontWeight: 700, marginBottom: 8 }}>💊 DM</div>
          {groceries.dm.map((cat, ci) => (
            <div key={ci} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "12px 14px", marginBottom: 10 }}>
              <div style={{ fontSize: 11, color: C.muted, fontWeight: 700, marginBottom: 8, textTransform: "uppercase", letterSpacing: 1 }}>{cat.cat}</div>
              {cat.items.map((item, ii) => <div key={ii} style={{ borderTop: ii>0 ? `1px solid ${C.border}` : "none" }}><CheckRow item={item} id={`d-${ci}-${ii}`} /></div>)}
            </div>
          ))}
        </div>
      );
    }

    function BusTab() {
      const mo = days.find(d => d.id === "mo");
      const tot = sumDay(mo.meals);
      return (
        <div>
          <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px", marginBottom: 14 }}>
            <div style={{ fontSize: 28, marginBottom: 6 }}>🚌</div>
            <div style={{ fontSize: 17, fontWeight: 700, color: C.text, marginBottom: 4 }}>24h Busfahrt – Montag</div>
            <div style={{ fontSize: 12, color: C.muted, marginBottom: 12 }}>Kaum Bewegung → bewusst wenig. Kein Käse, kein Sojasoße → kein Wassereinlagern.</div>
            <div style={{ display: "flex", gap: 20 }}>
              <Badge label="Kcal gesamt" value={tot.kcal} color={C.accent} />
              <Badge label="Protein" value={`${tot.p}g`} color={C.blue} />
              <Badge label="KH" value={`${tot.k}g`} color={C.yellow} />
              <Badge label="Fett" value={`${tot.f}g`} color="#a5d6a7" />
            </div>
          </div>
          <div style={{ background: C.yellowLow, border: "1px solid #4a3a00", borderRadius: 10, padding: "12px 14px", marginBottom: 14 }}>
            <div style={{ fontSize: 12, color: C.yellow, fontWeight: 700, marginBottom: 4 }}>🍔 McEs – 1 Stop Raststätte</div>
            <div style={{ fontSize: 13, color: C.text }}>Veggie Burger + Pommes oder Veggie Wrap. Kein Alkohol – du willst Dienstag definiert aussehen.</div>
          </div>
          {mo.meals.map((m, i) => <MealCard key={i} meal={m} />)}
        </div>
      );
    }

    function App() {
      const [tab, setTab] = useState("plan");
      const tabs = [{ id: "plan", label: "📅 Plan" }, { id: "grocery", label: "🛒 Einkaufen" }, { id: "bus", label: "🚌 Busfahrt" }];
      return (
        <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: "'Inter', system-ui, sans-serif" }}>
          <div style={{ background: "#0f0f0f", borderBottom: `1px solid ${C.border}`, padding: "14px 16px 0", position: "sticky", top: 0, zIndex: 10 }}>
            <div style={{ maxWidth: 520, margin: "0 auto" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                <span style={{ fontSize: 18, fontWeight: 900, color: C.accent, letterSpacing: -0.5 }}>POWERLIFTING</span>
                <span style={{ fontSize: 11, color: C.muted, letterSpacing: 1 }}>DO – MO · 95kg · Vegetarisch</span>
              </div>
              <div style={{ display: "flex" }}>
                {tabs.map(t => (
                  <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, background: "none", border: "none", borderBottom: `2px solid ${tab===t.id ? C.accent : "transparent"}`, color: tab===t.id ? C.text : C.muted, padding: "8px 4px", fontSize: 13, fontWeight: tab===t.id ? 700 : 400, cursor: "pointer" }}>{t.label}</button>
                ))}
              </div>
            </div>
          </div>
          <div style={{ maxWidth: 520, margin: "0 auto", padding: "16px 14px 50px" }}>
            {tab === "plan" && <PlanTab />}
            {tab === "grocery" && <GroceryTab />}
            {tab === "bus" && <BusTab />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
